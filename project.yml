name: HermesPocket
options:
  bundleIdPrefix: com.evanyudis
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
  LaTeXSwiftUI:
    url: https://github.com/colinc86/LaTeXSwiftUI
    from: 1.1.2
  SwiftDraw:
    url: https://github.com/swhitty/SwiftDraw
    from: 0.18.1
  Markdown:
    url: https://github.com/swiftlang/swift-markdown
    branch: main
targets:
  HermesPocket:
    type: application
    platform: iOS
    sources:
      - path: HermesPocket
    resources:
      - path: HermesPocket/Resources
      - path: HermesPocket/Resources/Assets.xcassets
    dependencies:
      - package: MarkdownUI
      - package: LaTeXSwiftUI
      - package: SwiftDraw
      - package: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evanyudis.hermes-pocket
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: Hermes Pocket
        INFOPLIST_KEY_NSCameraUsageDescription: Hermes Pocket uses the camera to attach photos to your message.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Hermes Pocket uses your photo library to attach selected media to your message.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Hermes Pocket saves images to your photo library when you tap the download button.
        PRODUCT_NAME: Hermes Pocket
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: V93K683C79
    scheme:
      testTargets: []
